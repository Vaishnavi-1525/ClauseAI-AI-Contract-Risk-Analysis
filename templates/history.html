<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-xl font-bold">📄 Analysis History</h1>

    <a href="/index" class="bg-blue-600 text-white px-4 py-2 rounded">
      Back
    </a>
  </div>

  <!-- CONTENT -->
  <div class="max-w-6xl mx-auto mt-6 space-y-4" id="historyList">

    <!-- data will come here -->

  </div>

<script>
async function loadHistory() {
  const res = await fetch("/history");
  const data = await res.json();

  const container = document.getElementById("historyList");

  if (data.length === 0) {
    container.innerHTML = `
      <div class="text-center text-gray-500 mt-20">
        No history found 😕
      </div>
    `;
    return;
  }

  container.innerHTML = "";

  data.forEach(item => {
  container.innerHTML += `
    <div class="p-4 bg-white rounded shadow mb-3 flex justify-between items-center">
      
      <div>
        <h3 class="font-semibold">${item.name}</h3>
        <p class="text-sm text-gray-500">${item.date}</p>
      </div>

      <div class="flex gap-2">
        <a href="${item.url}" target="_blank" 
           class="px-3 py-1 bg-green-500 text-white rounded">View</a>

        <a href="${item.url}" download 
           class="px-3 py-1 bg-blue-500 text-white rounded">Download</a>

        <button onclick="deleteFile('${item.name}')" 
           class="px-3 py-1 bg-red-500 text-white rounded">Delete</button>
    
        <button onclick="copyLink()" class="premium-button">
  Share Report 🔗
</button>


      </div>

    </div>
    
  `;
});
}
async function deleteFile(fileName) {
  if (!confirm("Are you sure you want to delete this file?")) return;

  const res = await fetch("/delete-report", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ file_name: fileName })
  });

  const data = await res.json();

  if (data.status === "success") {
    alert("Deleted successfully ✅");
    loadHistory(); // 🔥 refresh list
  } else {
    alert("Failed to delete ❌");
  }
}
loadHistory();
</script>
<script>
function copyLink() {
  const link = window.location.origin + "/report/{{ report_id }}";
  navigator.clipboard.writeText(link);
  alert("Link copied ✅");
}
</script>
</body>
</html>
